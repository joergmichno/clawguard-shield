services:
  clawguard-shield:
    build: .
    container_name: clawguard-shield
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
