name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask==3.1.0 gunicorn==23.0.0 stripe==12.1.0 pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Health check smoke test
        run: |
          python -c "from app import app; client = app.test_client(); r = client.get('/api/v1/health'); assert r.status_code == 200; print('Health check passed')"
